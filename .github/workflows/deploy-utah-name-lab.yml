name: Deploy Utah Name Lab

on:
  push:
    branches:
      - main
    paths:
      - "utah-name-generator/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sararands-site
        uses: actions/checkout@v4

      - name: Add CNAME
        run: echo "utahnames.sararands.com" > utah-name-generator/CNAME

      - name: Deploy to UtahNameLab repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.UTAH_NAME_LAB_DEPLOY_TOKEN }}
          repository-name: SaraRands/UtahNameLab
          branch: main
          folder: utah-name-generator
          clean: false
